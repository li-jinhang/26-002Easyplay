<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国象棋对战 - EasyPlay</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: #1a1a1a;
            color: white;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            font-size: 1rem;
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
        }

        .room-controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .room-controls input {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 150px;
        }

        .room-controls button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            color: white;
        }

        .btn-create { background-color: #4CAF50; }
        .btn-create:hover { background-color: #45a049; }
        
        .btn-join { background-color: #2196F3; }
        .btn-join:hover { background-color: #1e88e5; }

        .btn-watch { background-color: #9c27b0; }
        .btn-watch:hover { background-color: #8e24aa; }

        .game-info {
            display: none;
            background: white;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .game-info span {
            font-weight: bold;
        }

        .player-panels {
            display: none;
            width: 100%;
            max-width: 500px;
            margin-bottom: 16px;
            gap: 12px;
        }

        .player-panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-avatar-btn {
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
        }

        .player-avatar-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .player-avatar-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .player-avatar-btn.self {
            background: linear-gradient(135deg, #ff7043, #e64a19);
        }

        .player-avatar-btn.opponent {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
        }

        .player-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .player-name {
            font-weight: bold;
            color: #333;
        }

        .player-status {
            font-size: 0.92rem;
            color: #666;
        }

        .board-wrapper {
            transform-origin: top center;
            width: 450px;
            height: 500px;
        }

        .board-wrapper.game-ended .board-container {
            filter: grayscale(1) brightness(0.82);
            box-shadow: 0 10px 20px rgba(0,0,0,0.18);
        }

        .board-wrapper.game-ended .piece {
            opacity: 0.9;
        }

        .board-wrapper.game-ended .dot {
            display: none !important;
        }

        .board-container {
            display: none;
            position: relative;
            width: 450px;
            height: 500px;
            background-color: #e2b97f;
            border: 2px solid #5c3a21;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background-image: 
                linear-gradient(#5c3a21 1px, transparent 1px),
                linear-gradient(90deg, #5c3a21 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: 25px 25px;
        }

        /* 画楚河汉界 */
        .river {
            position: absolute;
            top: 225px; /* 4.5 * 50 */
            left: 25px;
            width: 400px;
            height: 50px;
            background-color: #e2b97f;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #5c3a21;
            font-family: "楷体", KaiTi, serif;
        }

        /* 修复边框和交叉线 */
        .board-lines {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 400px;
            height: 450px;
            border: 2px solid #5c3a21;
            pointer-events: none;
        }

        /* 九宫格斜线 */
        .palace-line {
            position: absolute;
            width: 141.4px; /* 100 * sqrt(2) */
            height: 1px;
            background-color: #5c3a21;
            pointer-events: none;
            transform-origin: 0 0;
        }

        .piece {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #f5deb3;
            border: 2px solid #333;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3), 2px 2px 5px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            font-family: "楷体", KaiTi, serif;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.2s;
            user-select: none;
            z-index: 10;
        }

        .piece.red {
            color: #d32f2f;
            border-color: #d32f2f;
        }

        .piece.black {
            color: #1a1a1a;
            border-color: #1a1a1a;
        }

        .piece.selected {
            box-shadow: 0 0 10px 5px rgba(255, 255, 0, 0.7);
            z-index: 20;
        }

        .piece.last-move {
            box-shadow: 0 0 10px 5px rgba(33, 150, 243, 0.7);
            z-index: 15;
        }

        .dot {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: rgba(0, 150, 0, 0.6);
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 5;
            display: none;
        }

        .dot:hover {
            background-color: rgba(0, 200, 0, 0.9);
        }

        #message-box {
            margin-top: 15px;
            color: #d32f2f;
            font-weight: bold;
            height: 20px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            width: 100%;
            max-width: 360px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 14px 30px rgba(0,0,0,0.25);
            padding: 24px;
            text-align: center;
        }

        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #222;
        }

        .modal-content p {
            margin: 0 0 20px;
            color: #555;
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-actions button {
            min-width: 110px;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            color: white;
        }

        .btn-cancel {
            background: #9e9e9e;
        }

        .btn-cancel:hover {
            background: #8a8a8a;
        }

        .btn-surrender {
            background: #e53935;
        }

        .btn-surrender:hover {
            background: #d32f2f;
        }

        /* 响应式媒体查询 */
        @media (max-width: 500px) {
            /* 在小屏幕下，调整房间控制区域的布局 */
            .room-controls {
                flex-direction: column;
                padding: 15px;
                width: 90%;
            }
            .room-controls input {
                width: 100%;
                box-sizing: border-box;
            }
            .room-controls button {
                width: 100%;
            }
            .player-panels {
                width: 90%;
                flex-direction: column;
            }
            /* 缩小棋盘以适应手机屏幕 */
            .board-wrapper {
                transform: scale(0.8);
                margin-bottom: -100px; /* 补偿 scale 带来的高度空白 */
            }
            /* 隐藏返回按钮文字，仅保留图标或在特定宽度隐藏 */
            .back-btn-text {
                display: none;
            }
        }
        @media (max-width: 400px) {
            .board-wrapper {
                transform: scale(0.7);
                margin-bottom: -150px;
            }
        }
        @media (max-width: 350px) {
            .board-wrapper {
                transform: scale(0.6);
                margin-bottom: -200px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="back-btn">← <span class="back-btn-text">返回大厅</span></a>
        <h1>中国象棋对战</h1>
    </header>

    <div class="container">
        <div class="room-controls" id="room-controls">
            <button class="btn-create" onclick="createRoom()">创建随机房间</button>
            <span> 或 </span>
            <input type="text" id="room-input" placeholder="输入4位房间号" maxlength="4">
            <button class="btn-join" onclick="joinRoom()">加入房间</button>
            <button class="btn-watch" onclick="watchRoom()">观战房间</button>
        </div>

        <div class="game-info" id="game-info">
            房间号: <span id="display-room-id" style="color:#2196F3;">----</span> | 
            你的阵营: <span id="display-color">等待加入...</span> | 
            当前状态: <span id="display-turn" style="color:#ff9800;">等待对手</span> |
            观众席: <span id="display-spectators">0/5</span>
        </div>

        <div class="player-panels" id="player-panels">
            <div class="player-panel">
                <button type="button" class="player-avatar-btn opponent" id="opponent-avatar-btn" title="对手头像">敌</button>
                <div class="player-meta">
                    <div class="player-name" id="opponent-name">对手</div>
                    <div class="player-status" id="opponent-status">等待加入</div>
                </div>
            </div>
            <div class="player-panel">
                <button type="button" class="player-avatar-btn self" id="self-avatar-btn" title="我的头像">我</button>
                <div class="player-meta">
                    <div class="player-name" id="self-name">我方</div>
                    <div class="player-status" id="self-status">等待开始</div>
                </div>
            </div>
        </div>

        <div id="message-box"></div>

        <div class="board-wrapper" id="board-wrapper" style="display: none;">
            <div class="board-container" id="board">
                <div class="board-lines"></div>
                <!-- 楚河汉界 -->
                <div class="river">
                    <div>楚河</div>
                    <div>汉界</div>
                </div>
                <!-- 九宫格斜线 黑方 -->
                <div class="palace-line" style="top: 25px; left: 175px; transform: rotate(45deg);"></div>
                <div class="palace-line" style="top: 25px; left: 275px; transform: rotate(135deg);"></div>
                <!-- 九宫格斜线 红方 -->
                <div class="palace-line" style="top: 375px; left: 175px; transform: rotate(45deg);"></div>
                <div class="palace-line" style="top: 375px; left: 275px; transform: rotate(135deg);"></div>
                
                <!-- 棋子将由 JS 动态生成 -->
                <!-- 移动提示点 -->
                <div id="dots-container"></div>
            </div>
        </div>
    </div>

    <div id="surrender-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>确认投降</h3>
            <p>投降后本局将立即结束，并判定对手获胜。是否继续？</p>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="cancel-surrender-btn">取消</button>
                <button type="button" class="btn-surrender" id="confirm-surrender-btn">确认投降</button>
            </div>
        </div>
    </div>

    <!-- 引入 Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/xiangqiRules.js"></script>
    <script>
        const PLAYER_TOKEN_KEY = 'easyplay_xiangqi_player_token';
        let playerToken = localStorage.getItem(PLAYER_TOKEN_KEY);
        if (!playerToken) {
            playerToken = (window.crypto && window.crypto.randomUUID)
                ? window.crypto.randomUUID()
                : `token_${Date.now()}_${Math.random().toString(36).slice(2)}`;
            localStorage.setItem(PLAYER_TOKEN_KEY, playerToken);
        }

        const socket = io({
            auth: { playerToken }
        });
        let myRoomId = null;
        let myRole = null; // 'player' or 'spectator'
        let myColor = null; // 'red' or 'black'
        let currentTurn = 'red'; // 红方先手
        let gameStatus = 'idle'; // idle, waiting, playing, finished
        let boardState = []; // 10x9 数组
        let selectedPiece = null;
        let lastMove = null; // {from: {x,y}, to: {x,y}}

        const boardEl = document.getElementById('board');
        const dotsContainer = document.getElementById('dots-container');
        const msgBox = document.getElementById('message-box');
        const playerPanelsEl = document.getElementById('player-panels');
        const selfAvatarBtn = document.getElementById('self-avatar-btn');
        const opponentAvatarBtn = document.getElementById('opponent-avatar-btn');
        const selfStatusEl = document.getElementById('self-status');
        const opponentStatusEl = document.getElementById('opponent-status');
        const surrenderModal = document.getElementById('surrender-modal');
        const cancelSurrenderBtn = document.getElementById('cancel-surrender-btn');
        const confirmSurrenderBtn = document.getElementById('confirm-surrender-btn');

        // ==== 网络通信部分 ====

        function updateBoardEndState() {
            const boardWrapper = document.getElementById('board-wrapper');
            boardWrapper.classList.toggle('game-ended', gameStatus === 'finished');
        }

        function showPlayerPanels() {
            playerPanelsEl.style.display = 'flex';
        }

        function updatePlayerPanels() {
            const selfNameEl = document.getElementById('self-name');
            const opponentNameEl = document.getElementById('opponent-name');

            if (myRole === 'spectator') {
                selfNameEl.innerText = '观众';
                selfStatusEl.innerText = '仅可观战';
                opponentNameEl.innerText = '对局双方';
                opponentStatusEl.innerText = currentTurn ? '对局进行中' : '对局已结束';
                selfAvatarBtn.disabled = true;
                opponentAvatarBtn.disabled = true;
                return;
            }

            selfNameEl.innerText = myColor === 'red' ? '红方（我）' : (myColor === 'black' ? '黑方（我）' : '我方');
            opponentNameEl.innerText = myColor === 'red' ? '黑方（对手）' : '红方（对手）';

            if (gameStatus === 'waiting') {
                selfStatusEl.innerText = '等待开局';
                opponentStatusEl.innerText = '等待加入';
            } else if (myColor) {
                selfStatusEl.innerText = currentTurn ? (currentTurn === myColor ? '当前可操作' : '等待对手走棋') : '本局已结束';
                opponentStatusEl.innerText = currentTurn ? (currentTurn === myColor ? '等待中' : '当前行动中') : '本局已结束';
            } else {
                selfStatusEl.innerText = '等待开始';
                opponentStatusEl.innerText = '等待加入';
            }
        }

        function updateSurrenderButtonState() {
            const canSurrender = myRole === 'player' && !!myColor && !!myRoomId && gameStatus === 'playing' && currentTurn !== null;
            selfAvatarBtn.disabled = !canSurrender;
            opponentAvatarBtn.disabled = true;
        }

        function openSurrenderModal() {
            if (myRole !== 'player') {
                showMsg('观战模式无法投降');
                return;
            }
            if (!myRoomId || !myColor || currentTurn === null) {
                showMsg('当前无法发起投降');
                return;
            }
            surrenderModal.classList.add('show');
        }

        function closeSurrenderModal() {
            surrenderModal.classList.remove('show');
        }

        function createRoom() {
            socket.emit('createRoom');
        }

        function joinRoom() {
            const roomId = document.getElementById('room-input').value.trim();
            if (roomId.length === 4) {
                socket.emit('joinRoom', roomId);
            } else {
                showMsg('请输入4位房间号');
            }
        }

        function watchRoom() {
            const roomId = document.getElementById('room-input').value.trim();
            if (roomId.length === 4) {
                socket.emit('watchRoom', roomId);
            } else {
                showMsg('请输入4位房间号');
            }
        }

        socket.on('roomCreated', (roomId) => {
            myRoomId = roomId;
            myRole = 'player';
            myColor = 'red';
            gameStatus = 'waiting';
            document.getElementById('room-controls').style.display = 'none';
            document.getElementById('game-info').style.display = 'block';
            showPlayerPanels();
            document.getElementById('display-room-id').innerText = roomId;
            document.getElementById('display-color').innerText = '红方 (先手)';
            document.getElementById('display-color').style.color = '#d32f2f';
            document.getElementById('display-spectators').innerText = '0/5';
            updatePlayerPanels();
            updateSurrenderButtonState();
            updateBoardEndState();
            showMsg('房间创建成功，等待对手加入...');
        });

        socket.on('roomJoined', (data) => {
            myRoomId = data.roomId;
            myRole = 'player';
            myColor = data.color || myColor;
            gameStatus = 'waiting';
            document.getElementById('room-controls').style.display = 'none';
            document.getElementById('game-info').style.display = 'block';
            showPlayerPanels();
            document.getElementById('display-room-id').innerText = myRoomId;
            if (typeof data.spectatorCount === 'number' && typeof data.maxSpectators === 'number') {
                document.getElementById('display-spectators').innerText = `${data.spectatorCount}/${data.maxSpectators}`;
            }
            updatePlayerPanels();
            updateSurrenderButtonState();
            updateBoardEndState();
        });

        socket.on('watchJoined', (data) => {
            const {
                roomId,
                boardState: watchedBoardState,
                currentTurn: watchedTurn,
                status,
                spectatorCount,
                maxSpectators
            } = data;
            myRoomId = roomId;
            myRole = 'spectator';
            myColor = null;
            boardState = watchedBoardState;
            currentTurn = watchedTurn;
            gameStatus = status;
            selectedPiece = null;
            lastMove = null;

            document.getElementById('room-controls').style.display = 'none';
            document.getElementById('game-info').style.display = 'block';
            showPlayerPanels();
            document.getElementById('display-room-id').innerText = myRoomId;
            document.getElementById('display-color').innerText = '观众';
            document.getElementById('display-color').style.color = '#9c27b0';
            document.getElementById('display-spectators').innerText = `${spectatorCount}/${maxSpectators}`;

            if (status === 'finished') {
                document.getElementById('display-turn').innerText = '对局已结束';
                document.getElementById('display-turn').style.color = '#e91e63';
                currentTurn = null;
            } else if (status === 'waiting') {
                document.getElementById('display-turn').innerText = '等待双方就绪';
                document.getElementById('display-turn').style.color = '#ff9800';
            } else {
                updateTurnDisplay();
            }

            document.getElementById('board-wrapper').style.display = 'block';
            document.getElementById('board').style.display = 'block';
            renderBoard();
            applyBoardOrientation();
            updatePlayerPanels();
            updateSurrenderButtonState();
            updateBoardEndState();
            showMsg('已加入观战');
        });

        socket.on('gameStart', (data) => {
            myRole = 'player';
            myColor = data.color;
            gameStatus = 'playing';
            document.getElementById('display-color').innerText = myColor === 'red' ? '红方 (先手)' : '黑方 (后手)';
            document.getElementById('display-color').style.color = myColor === 'red' ? '#d32f2f' : '#1a1a1a';
            document.getElementById('board-wrapper').style.display = 'block';
            document.getElementById('board').style.display = 'block';
            
            initBoard();
            renderBoard();
            updateTurnDisplay();
            updatePlayerPanels();
            updateSurrenderButtonState();
            updateBoardEndState();
            showMsg('游戏开始！');
            applyBoardOrientation();
        });

        socket.on('spectatorGameStart', (data) => {
            if (myRole !== 'spectator') return;
            boardState = data.boardState;
            currentTurn = data.currentTurn;
            gameStatus = 'playing';
            document.getElementById('board-wrapper').style.display = 'block';
            document.getElementById('board').style.display = 'block';
            renderBoard();
            updateTurnDisplay();
            updatePlayerPanels();
            updateSurrenderButtonState();
            updateBoardEndState();
            showMsg('对局开始，观战中');
        });

        socket.on('roomRecovered', (data) => {
            const { roomId, color, boardState: recoveredBoardState, currentTurn: recoveredTurn, status } = data;
            myRoomId = roomId;
            myRole = 'player';
            myColor = color;
            boardState = recoveredBoardState;
            currentTurn = recoveredTurn;
            gameStatus = status;
            selectedPiece = null;
            lastMove = null;

            document.getElementById('room-controls').style.display = 'none';
            document.getElementById('game-info').style.display = 'block';
            showPlayerPanels();
            document.getElementById('display-room-id').innerText = roomId;
            document.getElementById('display-color').innerText = myColor === 'red' ? '红方 (先手)' : '黑方 (后手)';
            document.getElementById('display-color').style.color = myColor === 'red' ? '#d32f2f' : '#1a1a1a';

            if (status === 'playing') {
                document.getElementById('board-wrapper').style.display = 'block';
                document.getElementById('board').style.display = 'block';
                renderBoard();
                updateTurnDisplay();
                applyBoardOrientation();
            } else {
                document.getElementById('display-turn').innerText = '等待对手';
                document.getElementById('display-turn').style.color = '#ff9800';
            }

            updatePlayerPanels();
            updateSurrenderButtonState();
            updateBoardEndState();
            showMsg('已恢复到断线前房间');
        });

        socket.on('spectatorCountUpdate', (data) => {
            const { spectatorCount, maxSpectators } = data;
            document.getElementById('display-spectators').innerText = `${spectatorCount}/${maxSpectators}`;
        });

        socket.on('moveSuccess', (data) => {
            const { from, to, nextTurn, isCheck, isCheckmate } = data;
            
            // 更新本地状态
            boardState[to.y][to.x] = boardState[from.y][from.x];
            boardState[from.y][from.x] = null;
            lastMove = { from, to };
            currentTurn = nextTurn;
            selectedPiece = null;

            renderBoard();
            updateTurnDisplay();
            updatePlayerPanels();
            updateSurrenderButtonState();
            updateBoardEndState();

            if (isCheckmate) {
                showMsg('绝杀！游戏结束');
            } else if (isCheck) {
                showMsg('将军！');
                document.getElementById('display-turn').innerText += ' (将军)';
                document.getElementById('display-turn').style.color = '#e91e63';
            }
        });

        socket.on('syncBoard', (data) => {
            boardState = data.boardState;
            currentTurn = data.currentTurn;
            renderBoard();
            updateTurnDisplay();
            updatePlayerPanels();
            updateSurrenderButtonState();
            updateBoardEndState();
            showMsg('已同步最新棋盘状态');
        });

        socket.on('gameOver', (data) => {
            const { winner, reason, surrenderColor } = data;
            document.getElementById('display-turn').innerText = `${winner} 胜利！`;
            document.getElementById('display-turn').style.color = '#e91e63';
            gameStatus = 'finished';
            currentTurn = null; // 停止游戏
            if (reason === 'checkmate') {
                showMsg('绝杀无解，游戏结束！');
            } else if (reason === 'surrender') {
                if (myRole === 'spectator') {
                    showMsg(surrenderColor === 'red' ? '红方已投降，本局结束' : '黑方已投降，本局结束');
                } else {
                    showMsg(surrenderColor === myColor ? '你已投降，本局结束' : '对手已投降，本局获胜！');
                }
            }
            closeSurrenderModal();
            updatePlayerPanels();
            updateSurrenderButtonState();
            updateBoardEndState();
        });

        socket.on('opponentTemporaryDisconnected', (data) => {
            const timeoutSeconds = data?.timeoutSeconds || 120;
            showMsg(`对手网络中断，${timeoutSeconds}秒内重连可继续`);
            document.getElementById('display-turn').innerText = '等待对手重连';
            document.getElementById('display-turn').style.color = '#ff9800';
            updatePlayerPanels();
        });

        socket.on('opponentReconnected', () => {
            showMsg('对手已重连，游戏继续');
            updateTurnDisplay();
            updatePlayerPanels();
        });

        socket.on('roomTerminated', () => {
            showMsg('对手离线超时，房间已终止');
            document.getElementById('display-turn').innerText = '游戏结束';
            document.getElementById('display-turn').style.color = '#e91e63';
            gameStatus = 'finished';
            currentTurn = null;
            closeSurrenderModal();
            updatePlayerPanels();
            updateSurrenderButtonState();
            updateBoardEndState();
        });

        socket.on('errorMsg', (msg) => {
            showMsg(msg);
        });

        function showMsg(msg) {
            msgBox.innerText = msg;
            setTimeout(() => { if(msgBox.innerText === msg) msgBox.innerText = ''; }, 3000);
        }

        function updateTurnDisplay() {
            const turnEl = document.getElementById('display-turn');
            if (!currentTurn) {
                turnEl.innerText = '游戏结束';
                turnEl.style.color = '#e91e63';
                return;
            }
            if (myRole === 'spectator') {
                turnEl.innerText = currentTurn === 'red' ? '红方回合' : '黑方回合';
                turnEl.style.color = currentTurn === 'red' ? '#d32f2f' : '#1a1a1a';
                return;
            }
            if (currentTurn === myColor) {
                turnEl.innerText = '你的回合';
                turnEl.style.color = '#4CAF50';
            } else {
                turnEl.innerText = '对手的回合';
                turnEl.style.color = '#f44336';
            }
            updatePlayerPanels();
        }

        function applyBoardOrientation() {
            boardEl.style.transform = myColor === 'black' ? 'rotate(180deg)' : 'none';
        }

        // ==== 棋盘逻辑部分 ====

        function initBoard() {
            boardState = XiangqiRules.getBoardCopy();
            currentTurn = 'red';
            selectedPiece = null;
            lastMove = null;
            updateBoardEndState();
        }

        function renderBoard() {
            // 清理旧棋子
            const pieces = document.querySelectorAll('.piece');
            pieces.forEach(p => p.remove());
            dotsContainer.innerHTML = '';

            for (let y = 0; y < 10; y++) {
                for (let x = 0; x < 9; x++) {
                    const p = boardState[y][x];
                    if (p) {
                        renderPiece(x, y, p);
                    }
                }
            }
        }

        function renderPiece(x, y, type) {
            const piece = document.createElement('div');
            piece.className = `piece ${XiangqiRules.pieceColor[type]}`;
            piece.innerText = type;
            piece.dataset.x = x;
            piece.dataset.y = y;
            piece.style.left = (25 + x * 50) + 'px';
            piece.style.top = (25 + y * 50) + 'px';
            
            if (myColor === 'black') {
                piece.style.transform = 'translate(-50%, -50%) rotate(180deg)';
            }

            // 高亮最后移动的棋子
            if (lastMove && (lastMove.to.x === x && lastMove.to.y === y)) {
                piece.classList.add('last-move');
            }

            piece.onclick = () => onPieceClick(x, y);
            boardEl.appendChild(piece);
        }

        function onPieceClick(x, y) {
            if (myRole !== 'player') {
                showMsg('观战模式不可操作棋子');
                return;
            }
            if (currentTurn !== myColor) {
                showMsg('还没到你的回合！');
                return;
            }

            const piece = boardState[y][x];
            
            // 点击自己的棋子：选中
            if (piece && XiangqiRules.pieceColor[piece] === myColor) {
                selectedPiece = {x, y};
                // 更新高亮
                document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
                const el = document.querySelector(`.piece[data-x="${x}"][data-y="${y}"]`);
                if (el) el.classList.add('selected');
                showValidMoves(x, y);
            } 
            // 点击对方棋子：如果是移动目标，则吃子
            else if (selectedPiece) {
                tryMove(selectedPiece.x, selectedPiece.y, x, y);
            }
        }

        function onEmptyClick(x, y) {
            if (myRole !== 'player') return;
            if (currentTurn !== myColor || !selectedPiece) return;
            tryMove(selectedPiece.x, selectedPiece.y, x, y);
        }

        // 显示可行走的提示点
        function showValidMoves(fromX, fromY) {
            dotsContainer.innerHTML = '';
            for (let y = 0; y < 10; y++) {
                for (let x = 0; x < 9; x++) {
                    if (XiangqiRules.isValidMove(boardState, fromX, fromY, x, y, myColor)) {
                        const dot = document.createElement('div');
                        dot.className = 'dot';
                        dot.style.display = 'block';
                        dot.style.left = (25 + x * 50) + 'px';
                        dot.style.top = (25 + y * 50) + 'px';
                        dot.onclick = (e) => {
                            e.stopPropagation();
                            tryMove(fromX, fromY, x, y);
                        };
                        dotsContainer.appendChild(dot);
                    }
                }
            }
        }

        function tryMove(fromX, fromY, toX, toY) {
            if (myRole !== 'player') return;
            if (XiangqiRules.isValidMove(boardState, fromX, fromY, toX, toY, myColor)) {
                // 发送给服务器，等待服务器确认
                socket.emit('move', {
                    roomId: myRoomId,
                    from: {x: fromX, y: fromY},
                    to: {x: toX, y: toY}
                });
                // 先不本地执行，等待 moveSuccess 事件以保证一致性
            } else {
                showMsg('非法移动或会送将');
            }
        }

        // 添加棋盘空白处点击事件
        boardEl.addEventListener('click', (e) => {
            if (e.target.classList.contains('board-container') || e.target.classList.contains('board-lines') || e.target.classList.contains('river') || e.target.classList.contains('palace-line')) {
                const rect = boardEl.getBoundingClientRect();
                // 计算实际缩放比例
                const scaleX = rect.width / 450;
                const scaleY = rect.height / 500;
                
                // 考虑点击位置，推算 x, y (还原缩放)
                const clickX = (e.clientX - rect.left) / scaleX;
                const clickY = (e.clientY - rect.top) / scaleY;
                
                let boardX = Math.round((clickX - 25) / 50);
                let boardY = Math.round((clickY - 25) / 50);
                
                if (myColor === 'black') {
                    boardX = 8 - boardX;
                    boardY = 9 - boardY;
                }

                if (boardX >= 0 && boardX <= 8 && boardY >= 0 && boardY <= 9) {
                    onEmptyClick(boardX, boardY);
                }
            }
        });

        selfAvatarBtn.addEventListener('click', openSurrenderModal);
        opponentAvatarBtn.addEventListener('click', () => showMsg('仅可通过自己的头像发起投降'));
        cancelSurrenderBtn.addEventListener('click', closeSurrenderModal);
        confirmSurrenderBtn.addEventListener('click', () => {
            if (!myRoomId) return;
            socket.emit('surrender', { roomId: myRoomId });
        });
        surrenderModal.addEventListener('click', (e) => {
            if (e.target === surrenderModal) {
                closeSurrenderModal();
            }
        });

    </script>
</body>
</html>
