<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斗地主 (联机) - Easyplay</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --table-color: #27ae60;
            --text-color: #ecf0f1;
            --card-width: 80px;
            --card-height: 120px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .room-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }
        .btn-primary:hover { background-color: #2980b9; }
        
        .btn-success {
            background-color: #2ecc71;
            color: white;
        }
        .btn-success:hover { background-color: #27ae60; }
        
        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }
        .btn-danger:hover { background-color: #c0392b; }

        input[type="text"] {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #bdc3c7;
            font-size: 1rem;
            width: 150px;
        }

        #gameArea {
            flex-grow: 1;
            display: none;
            flex-direction: column;
            position: relative;
            background-color: var(--table-color);
            overflow: hidden;
        }

        /* 隐藏底牌区域 */
        .hidden-cards {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
        }

        /* 对手区域 */
        .opponents {
            position: absolute;
            top: 20%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .player-info {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }

        .player-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .card-count {
            font-size: 0.9rem;
            color: #f1c40f;
        }
        
        .landlord-icon {
            display: inline-block;
            background: #f39c12;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            font-size: 12px;
            margin-left: 5px;
        }

        /* 桌面出牌区域 */
        .table-center {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .table-message {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .played-cards {
            display: flex;
            gap: -40px; /* 负间距让牌重叠 */
        }
        
        .played-cards .card {
            margin-left: -50px;
            transform: scale(0.8);
        }
        .played-cards .card:first-child {
            margin-left: 0;
        }

        /* 我的区域 */
        .my-area {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            height: 40px;
        }

        .my-cards {
            display: flex;
            justify-content: center;
            padding: 20px;
            height: var(--card-height);
        }

        /* 扑克牌样式 */
        .card {
            width: var(--card-width);
            height: var(--card-height);
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
            box-sizing: border-box;
            position: relative;
            user-select: none;
            transition: transform 0.2s;
            margin-left: -40px; /* 牌重叠 */
        }

        .my-cards .card {
            cursor: pointer;
        }

        .my-cards .card:first-child {
            margin-left: 0;
        }

        .my-cards .card:hover {
            transform: translateY(-10px);
        }

        .my-cards .card.selected {
            transform: translateY(-20px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border: 2px solid #f1c40f;
        }

        .card.red { color: #e74c3c; }
        .card.black { color: #2c3e50; }

        .card-top {
            font-size: 1.2rem;
            font-weight: bold;
            line-height: 1;
        }
        .card-suit {
            font-size: 1.5rem;
            margin-top: -2px;
        }
        .card-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
        }
        
        /* 牌背 */
        .card-back {
            background: linear-gradient(45deg, #2980b9, #8e44ad);
            border: 2px solid white;
        }

        /* 状态提示 */
        #statusMsg {
            text-align: center;
            margin: 20px 0;
            font-size: 1.2rem;
            color: #f1c40f;
        }

        .turn-indicator {
            box-shadow: 0 0 15px #f1c40f;
            border: 2px solid #f1c40f;
        }

        #setupArea {
            max-width: 600px;
            margin: 50px auto;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>斗地主 (联机)</h1>
        <div id="roomInfo" style="display: none;">房间号: <span id="roomIdDisplay"></span></div>
        <a href="index.html" class="back-btn">返回大厅</a>
    </header>

    <div id="setupArea">
        <h2>欢迎来到斗地主</h2>
        <p>创建房间或输入房间号加入好友对战</p>
        <div id="statusMsg"></div>
        <div class="room-controls">
            <button id="createRoomBtn" class="btn-primary">创建房间</button>
            <input type="text" id="roomIdInput" placeholder="输入房间号" maxlength="4">
            <button id="joinRoomBtn" class="btn-success">加入房间</button>
        </div>
    </div>

    <div id="gameArea">
        <!-- 底牌 -->
        <div class="hidden-cards" id="hiddenCards">
            <div class="card card-back"></div>
            <div class="card card-back"></div>
            <div class="card card-back"></div>
        </div>

        <!-- 对手 -->
        <div class="opponents">
            <div class="player-info" id="oppLeft">
                <div class="player-name">等待加入...</div>
                <div class="card-count">牌数: 0</div>
            </div>
            <div class="player-info" id="oppRight">
                <div class="player-name">等待加入...</div>
                <div class="card-count">牌数: 0</div>
            </div>
        </div>

        <!-- 桌面区 -->
        <div class="table-center">
            <div class="table-message" id="tableMessage"></div>
            <div class="played-cards" id="playedCards">
                <!-- 出的牌将在这里显示 -->
            </div>
        </div>

        <!-- 我的区域 -->
        <div class="my-area">
            <div class="action-buttons" id="actionButtons">
                <!-- 按钮动态生成 -->
            </div>
            <div class="my-cards" id="myCards">
                <!-- 我的牌 -->
            </div>
            <div class="player-info" id="myInfo" style="margin-top: 10px;">
                <span class="player-name" id="myName">我</span>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // DOM Elements
        const setupArea = document.getElementById('setupArea');
        const gameArea = document.getElementById('gameArea');
        const roomInfo = document.getElementById('roomInfo');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const statusMsg = document.getElementById('statusMsg');
        const createRoomBtn = document.getElementById('createRoomBtn');
        const joinRoomBtn = document.getElementById('joinRoomBtn');
        const roomIdInput = document.getElementById('roomIdInput');
        
        const myCardsContainer = document.getElementById('myCards');
        const hiddenCardsContainer = document.getElementById('hiddenCards');
        const actionButtons = document.getElementById('actionButtons');
        const tableMessage = document.getElementById('tableMessage');
        const playedCardsContainer = document.getElementById('playedCards');
        
        const oppLeft = document.getElementById('oppLeft');
        const oppRight = document.getElementById('oppRight');
        const myInfo = document.getElementById('myInfo');

        // State
        let currentRoomId = null;
        let myName = localStorage.getItem('easyplay_user') || '游客' + Math.floor(Math.random()*1000);
        let selectedCards = new Set();
        let myHand = [];
        let gameState = null;

        // 设置我的名字
        document.getElementById('myName').textContent = myName;

        // Socket Events
        createRoomBtn.addEventListener('click', () => {
            socket.emit('pokerCreateRoom', myName);
        });

        joinRoomBtn.addEventListener('click', () => {
            const roomId = roomIdInput.value.trim();
            if (roomId.length === 4) {
                socket.emit('pokerJoinRoom', { roomId, playerName: myName });
            } else {
                showStatus('请输入4位房间号');
            }
        });

        socket.on('pokerRoomCreated', (roomId) => {
            currentRoomId = roomId;
            enterGameRoom(roomId);
            showTableMessage('等待其他玩家加入...');
        });

        socket.on('pokerRoomJoined', (data) => {
            currentRoomId = data.roomId;
            enterGameRoom(data.roomId);
            showTableMessage('等待游戏开始...');
        });

        socket.on('errorMsg', (msg) => {
            showStatus(msg);
            alert(msg);
        });

        socket.on('pokerMessage', (msg) => {
            showTableMessage(msg);
        });

        socket.on('pokerCallMessage', (data) => {
            const name = getPlayerName(data.player);
            const text = data.score === 0 ? '不叫' : `${data.score}分`;
            showTableMessage(`${name}: ${text}`);
        });

        socket.on('pokerPlayMessage', (data) => {
            const name = getPlayerName(data.player);
            if (data.cards.length === 0) {
                showTableMessage(`${name}: 不出`);
                // 清空出的牌
                if (gameState && gameState.currentPlay && gameState.currentPlay.player === data.player) {
                    // 不应该发生
                }
            } else {
                showTableMessage(`${name} 出牌`);
            }
        });

        socket.on('pokerGameOver', (data) => {
            const winner = data.winner === 'landlord' ? '地主' : '农民';
            alert(`游戏结束！${winner}胜利！`);
            showTableMessage(`游戏结束，${winner}赢了`);
            actionButtons.innerHTML = '';
        });

        socket.on('pokerRoomUpdate', (state) => {
            gameState = state;
            updateUI(state);
        });

        socket.on('pokerPlayerLeft', (pid) => {
            if (gameState && gameState.state !== 'over') {
                alert('有玩家离开了房间，游戏结束');
            }
        });

        // UI Helpers
        function showStatus(msg) {
            statusMsg.textContent = msg;
            setTimeout(() => statusMsg.textContent = '', 3000);
        }

        function showTableMessage(msg) {
            tableMessage.textContent = msg;
            // setTimeout(() => tableMessage.textContent = '', 3000);
        }

        function enterGameRoom(roomId) {
            setupArea.style.display = 'none';
            gameArea.style.display = 'flex';
            roomInfo.style.display = 'block';
            roomIdDisplay.textContent = roomId;
        }

        function getPlayerName(pid) {
            if (!gameState) return '未知';
            const p = gameState.players.find(p => p.id === pid);
            return p ? p.name : '未知';
        }

        function updateUI(state) {
            // 更新对手信息
            const meIndex = state.players.findIndex(p => p.id === socket.id);
            if (meIndex !== -1 && state.players.length === 3) {
                const rightIndex = (meIndex + 1) % 3;
                const leftIndex = (meIndex + 2) % 3;
                
                updatePlayerInfo(oppRight, state.players[rightIndex], state);
                updatePlayerInfo(oppLeft, state.players[leftIndex], state);
                updatePlayerInfo(myInfo, state.players[meIndex], state);
            } else if (state.players.length < 3) {
                // 未满3人
                oppLeft.querySelector('.player-name').textContent = '等待加入...';
                oppRight.querySelector('.player-name').textContent = '等待加入...';
                state.players.forEach((p, idx) => {
                    if (p.id !== socket.id) {
                        const target = idx === 1 ? oppRight : oppLeft;
                        target.querySelector('.player-name').textContent = p.name;
                    }
                });
            }

            // 更新底牌
            hiddenCardsContainer.innerHTML = '';
            state.hiddenCards.forEach(card => {
                hiddenCardsContainer.appendChild(createCardElement(card, !card));
            });

            // 更新我的手牌
            myHand = state.myCards;
            renderMyCards();

            // 更新桌面出的牌
            playedCardsContainer.innerHTML = '';
            if (state.currentPlay && state.currentPlay.cards.length > 0) {
                state.currentPlay.cards.forEach(card => {
                    playedCardsContainer.appendChild(createCardElement(card));
                });
            }

            // 更新按钮状态
            updateActionButtons(state);
        }

        function updatePlayerInfo(el, player, state) {
            const isTurn = state.currentTurnPlayer === player.id;
            let nameHtml = player.name;
            if (player.isLandlord) {
                nameHtml += '<span class="landlord-icon">地</span>';
            }
            el.querySelector('.player-name').innerHTML = nameHtml;
            el.querySelector('.card-count').textContent = `牌数: ${player.cardCount}`;
            
            if (isTurn && state.state !== 'waiting' && state.state !== 'over') {
                el.classList.add('turn-indicator');
            } else {
                el.classList.remove('turn-indicator');
            }
        }

        function renderMyCards() {
            myCardsContainer.innerHTML = '';
            myHand.forEach((card, index) => {
                const cardEl = createCardElement(card);
                if (selectedCards.has(card)) {
                    cardEl.classList.add('selected');
                }
                cardEl.addEventListener('click', () => {
                    if (selectedCards.has(card)) {
                        selectedCards.delete(card);
                        cardEl.classList.remove('selected');
                    } else {
                        selectedCards.add(card);
                        cardEl.classList.add('selected');
                    }
                });
                myCardsContainer.appendChild(cardEl);
            });
        }

        function createCardElement(cardStr, isBack = false) {
            const div = document.createElement('div');
            div.className = 'card';
            
            if (isBack || !cardStr) {
                div.classList.add('card-back');
                return div;
            }

            // cardStr format: S3, HT, W1, W2
            let suit = '', rank = '', color = 'black', suitSymbol = '';
            
            if (cardStr === 'W1') {
                rank = '小王'; color = 'black'; suitSymbol = '🃏';
            } else if (cardStr === 'W2') {
                rank = '大王'; color = 'red'; suitSymbol = '🃏';
            } else {
                const s = cardStr.charAt(0);
                const r = cardStr.charAt(1);
                
                if (s === 'S') { suitSymbol = '♠'; color = 'black'; }
                else if (s === 'H') { suitSymbol = '♥'; color = 'red'; }
                else if (s === 'C') { suitSymbol = '♣'; color = 'black'; }
                else if (s === 'D') { suitSymbol = '♦'; color = 'red'; }

                if (r === 'T') rank = '10';
                else rank = r;
            }

            div.classList.add(color);
            div.innerHTML = `
                <div class="card-top">
                    <div>${rank}</div>
                    <div class="card-suit">${suitSymbol}</div>
                </div>
                <div class="card-center">${suitSymbol}</div>
            `;
            return div;
        }

        function updateActionButtons(state) {
            actionButtons.innerHTML = '';
            
            if (state.state === 'waiting' || state.state === 'over') {
                return;
            }

            const isMyTurn = state.currentTurnPlayer === socket.id;
            
            if (!isMyTurn) {
                return; // 不是我的回合，不显示按钮
            }

            if (state.state === 'calling') {
                // 叫地主阶段
                const btn0 = document.createElement('button');
                btn0.className = 'btn-danger';
                btn0.textContent = '不叫';
                btn0.onclick = () => socket.emit('pokerCall', { roomId: currentRoomId, score: 0 });
                actionButtons.appendChild(btn0);

                for (let i = state.baseScore + 1; i <= 3; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-primary';
                    btn.textContent = `${i}分`;
                    btn.onclick = () => socket.emit('pokerCall', { roomId: currentRoomId, score: i });
                    actionButtons.appendChild(btn);
                }
            } else if (state.state === 'playing') {
                // 出牌阶段
                const isMustPlay = !state.currentPlay || state.currentPlay.player === socket.id;

                if (!isMustPlay) {
                    const passBtn = document.createElement('button');
                    passBtn.className = 'btn-danger';
                    passBtn.textContent = '不出';
                    passBtn.onclick = () => {
                        selectedCards.clear();
                        renderMyCards();
                        socket.emit('pokerPass', { roomId: currentRoomId });
                    };
                    actionButtons.appendChild(passBtn);
                }

                const playBtn = document.createElement('button');
                playBtn.className = 'btn-success';
                playBtn.textContent = '出牌';
                playBtn.onclick = () => {
                    if (selectedCards.size === 0) {
                        alert('请选择要出的牌');
                        return;
                    }
                    
                    // 这里为了简化，前端暂不进行严格的牌型和大小验证
                    // 在正式游戏中，这里需要验证选中的牌是否合法，是否大于桌上的牌
                    const cardsToPlay = Array.from(selectedCards);
                    // 排序保证一致性（根据规则后端排也行）
                    
                    socket.emit('pokerPlay', { roomId: currentRoomId, cards: cardsToPlay });
                    selectedCards.clear();
                };
                actionButtons.appendChild(playBtn);
            }
        }
    </script>
</body>
</html>
